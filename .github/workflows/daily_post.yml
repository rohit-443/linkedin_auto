name: Daily LinkedIn Interview Questions

on:
  # schedule:
  #   # Runs at 12:00 UTC (roughly 5:30 PM IST) every day Monday-Friday
  #   - cron: '0 12 * * 1-5'
  workflow_dispatch: # Allows manual triggering from the GitHub UI

jobs:
  post-questions:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests google-generativeai html2image pillow
          
      # html2image requires Chrome to be installed. Ubuntu-latest comes with it, but just ensuring it's accessible.
      - name: Ensure Chrome is available
        run: google-chrome --version
          
      - name: Create Credentials JSON
        env:
          LINKEDIN_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          GEMINI_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          echo '{
            "access_token": "'"$LINKEDIN_TOKEN"'",
            "gemini_api_key": "'"$GEMINI_KEY"'"
          }' > linked_in_token.json
          
      - name: Run Daily Poster Script
        run: python daily_poster.py
        
      - name: Commit and Push State Updates
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add state.json history.jsonl
          git commit -m "chore: save daily bot state updates [skip ci]" || echo "No state changes to commit"
          git push
