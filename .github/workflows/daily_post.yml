name: Daily LinkedIn Interview Questions

on:
  schedule:
    # Runs at 2:30 AM, 10:30 AM, and 6:30 PM UTC
    - cron: '30 2,10,18 * * *'
  workflow_dispatch: # Allows manual triggering from the GitHub UI

jobs:
  post-questions:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests google-generativeai html2image pillow
          
      # html2image requires Chrome to be installed. Ubuntu-latest comes with it, but just ensuring it's accessible.
      - name: Ensure Chrome is available
        run: google-chrome --version
          
      - name: Create Credentials JSON
        env:
          GEMINI_KEY: ${{ secrets.GEMINI_API_KEY }}
          DROPBOX_REFRESH_TOKEN: ${{ secrets.DROPBOX_REFRESH_TOKEN }}
          DROPBOX_CLIENT_ID: ${{ secrets.DROPBOX_CLIENT_ID }}
          DROPBOX_CLIENT_SECRET: ${{ secrets.DROPBOX_CLIENT_SECRET }}
          GMAIL_ID: ${{ secrets.INTERVIEW_GMAIL_ID }}
          GMAIL_PASSWORD: ${{ secrets.GOOGLE_APP_PASSWORD }}
        run: |
          echo '{
            "gemini_api_key": "'"$GEMINI_KEY"'",
            "DROPBOX_REFRESH_TOKEN": "'"$DROPBOX_REFRESH_TOKEN"'",
            "DROPBOX_CLIENT_ID": "'"$DROPBOX_CLIENT_ID"'",
            "DROPBOX_CLIENT_SECRET": "'"$DROPBOX_CLIENT_SECRET"'",
            "INTERVIEW_GMAIL_ID": "'"$GMAIL_ID"'",
            "GOOGLE_APP_PASSWORD": "'"$GMAIL_PASSWORD"'"
          }' > linked_in_token.json
          
      - name: Run Daily Poster Script
        run: python daily_poster.py
        
      - name: Commit and Push State Updates
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add state.json history.jsonl daily_responses.txt
          git commit -m "chore: save daily bot state updates [skip ci]" || echo "No state changes to commit"
          git push
